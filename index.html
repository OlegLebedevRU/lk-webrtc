<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leo4 WebRTC</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.2/cerulean/bootstrap.min.css" type="text/css"/>
<link rel="stylesheet" href="demo.css" type="text/css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" type="text/css"/>
<link rel="icon" href="favicon.ico"/>
</head>
<body>
<div class="container">
  <div class="row">
    <div class="col-md-12">
      <div class="pb-2 mt-4 mb-4 border-bottom">
        <h1>Leo4 WebRTC Server</h1>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <div class="card">
            <div class="card-header">
              <span class="card-title"><i class="fa-solid fa-video"></i> Streaming + SIP</span>
            </div>
            <div class="card-body">
              <p>Просмотр видеопотоков и SIP-звонки в одном интерфейсе.</p>
              <a href="streaming.html" class="btn btn-primary">Открыть</a>
            </div>
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <div class="card">
            <div class="card-header">
              <span class="card-title"><i class="fa-solid fa-phone"></i> SIP Gateway</span>
            </div>
            <div class="card-body">
              <p>Полнофункциональный SIP-клиент: регистрация, звонки, DTMF.</p>
              <a href="sip.html" class="btn btn-primary">Открыть</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <hr>
  <div class="footer text-center text-muted mb-3">
    <small>Leo4 WebRTC</small>
  </div>
</div>
</body>
</html>
