<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leo4 WebRTC — Streaming + SIP</title>
  <link rel="icon" href="./favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.2/cerulean/bootstrap.min.css">
  <link rel="stylesheet" href="./demo.css">
  <script src="./janus.js"></script>
  <script type="module" src="./src/web/streaming.ts"></script>
</head>
<body>
  <main class="container py-2">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h1 class="mb-0 fs-4">Streaming + SIP</h1>
      <a class="text-decoration-none small" data-bs-toggle="collapse" href="#pin-collapse" role="button" aria-expanded="false" aria-controls="pin-collapse">
        🔑 <span id="pin-status" class="badge bg-secondary">не задан</span>
      </a>
    </div>

    <div class="collapse mb-2" id="pin-collapse">
      <div class="input-group input-group-sm">
        <input class="form-control" id="pin-input" type="password" placeholder="Введите пинкод..." aria-label="Пинкод">
        <button class="btn btn-primary" type="button" id="pin-save">Сохранить</button>
        <button class="btn btn-outline-danger" type="button" id="pin-clear">Сбросить</button>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header d-flex align-items-center justify-content-between">
        Видео с камеры
        <span id="janus-status" title="Статус Janus">⚪</span>
      </div>
      <div class="card-body p-0">
        <div id="stream-media"></div>
      </div>
    </div>

    <!-- Call control widget - hidden by default -->
    <div id="call-widget" class="card shadow-sm mb-4" style="display: none;">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span id="call-widget-title">Входящий вызов</span>
        <span id="call-widget-status" title="Статус вызова">📞</span>
      </div>
      <div class="card-body py-2">
        <div id="call-widget-incoming" class="d-flex gap-2">
          <button class="btn btn-success flex-grow-1" type="button" id="call-answer">📞 Ответить</button>
          <button class="btn btn-danger" type="button" id="call-decline">Отклонить</button>
        </div>
        <div id="call-widget-active" class="d-flex gap-2" style="display: none;">
          <button class="btn btn-primary flex-grow-1" type="button" id="call-open">🔓 Открыть</button>
          <button class="btn btn-danger" type="button" id="call-hangup">Завершить</button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <section class="col-12 col-xl-6">
        <div class="card shadow-sm mb-4">
          <div class="card-header">
            <a class="text-decoration-none" data-bs-toggle="collapse" href="#streams-collapse" role="button" aria-expanded="true" aria-controls="streams-collapse">
              Потоки ▾
            </a>
          </div>
          <div class="collapse show" id="streams-collapse">
            <div class="card-body">
              <div id="stream-status" class="mb-3"></div>
              <label class="form-label" for="stream-select">Доступные потоки</label>
              <div class="input-group mb-3">
                <select class="form-select" id="stream-select"></select>
                <button class="btn btn-outline-secondary" type="button" id="refresh-streams">Обновить</button>
              </div>
              <button class="btn btn-primary w-100" type="button" id="watch-stream">Смотреть поток</button>
            </div>
          </div>
        </div>
      </section>

      <section class="col-12 col-xl-6">
        <div class="card shadow-sm mb-4">
          <div class="card-header d-flex align-items-center justify-content-between">
            <a class="text-decoration-none" data-bs-toggle="collapse" href="#sip-collapse" role="button" aria-expanded="false" aria-controls="sip-collapse">
              SIP ▾
            </a>
            <span id="sip-status-icon" title="Статус SIP" role="status" aria-live="polite">⚪</span>
          </div>
          <div class="collapse" id="sip-collapse">
            <div class="card-body">
              <label class="form-label" for="sip-username">Учетная запись</label>
              <input class="form-control mb-3" id="sip-username" type="text" disabled>
              <label class="form-label" for="peer">Кому звонить</label>
              <div class="input-group mb-3">
                <input class="form-control" id="peer" type="text" placeholder="sip:1000@example.com">
                <button class="btn btn-success" type="button" id="call">Позвонить</button>
              </div>
              <div id="call-status"></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="card shadow-sm mt-4">
      <div class="card-header">
        <a class="text-decoration-none" data-bs-toggle="collapse" href="#stream-metadata-collapse" role="button" aria-expanded="false" aria-controls="stream-metadata-collapse">
          Метаданные потока ▾
        </a>
      </div>
      <div class="collapse" id="stream-metadata-collapse">
        <div class="card-body">
          <pre id="stream-metadata" class="mb-0 small"></pre>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
