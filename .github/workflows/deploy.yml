name: Deploy site to Yandex S3
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp index.html dist/ 2>/dev/null || true
          cp streaming.html dist/
          cp sip.html dist/
          cp nop.html dist/
          cp streaming.js dist/
          cp sip.js dist/
          cp janus.js dist/
          cp settings.js dist/
          cp demo.css dist/
          cp favicon.ico dist/

      - name: List build output
        run: find dist -type f

      - name: Upload files to Yandex Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YANDEX_CLOUD_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_CLOUD_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync ./dist s3://${{ secrets.BUCKET }} \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --region ru-central1
