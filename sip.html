<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leo4 WebRTC — SIP</title>
  <link rel="icon" href="./favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.2/cerulean/bootstrap.min.css">
  <link rel="stylesheet" href="./demo.css">
  <script src="./janus.js"></script>
  <script type="module" src="./src/web/sip.ts"></script>
</head>
<body>
  <main class="container py-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
      <div>
        <h1 class="mb-1">SIP Gateway</h1>
        <p class="text-muted mb-0">Web-страница использует новый TypeScript-слой поверх Janus SIP Plugin.</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary" href="./index.html">Главная</a>
        <a class="btn btn-outline-primary" href="./streaming.html">Streaming + SIP</a>
      </div>
    </div>

    <div id="app-status" class="mb-3"></div>

    <div class="row g-4">
      <section class="col-12 col-xl-5">
        <div class="card shadow-sm mb-4">
          <div class="card-header">Регистрация SIP</div>
          <div class="card-body">
            <div id="register-status" class="mb-3"></div>
            <label class="form-label" for="proxy">Прокси</label>
            <input class="form-control mb-3" id="proxy" type="text" placeholder="sip:87.242.100.34:5060">
            <label class="form-label" for="username">SIP URI</label>
            <input class="form-control mb-3" id="username" type="text" placeholder="sip:6004@87.242.100.34">
            <label class="form-label" for="authuser">Auth user</label>
            <input class="form-control mb-3" id="authuser" type="text" placeholder="6004">
            <label class="form-label" for="displayname">Display name</label>
            <input class="form-control mb-3" id="displayname" type="text" placeholder="Panel N 6004">
            <label class="form-label" for="secret">Пароль / secret</label>
            <input class="form-control mb-3" id="secret" type="password" placeholder="6004">
            <button class="btn btn-primary w-100" type="button" id="register">Зарегистрировать</button>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header">Звонок</div>
          <div class="card-body">
            <div class="form-check mb-3">
              <input class="form-check-input" id="dovideo" type="checkbox">
              <label class="form-check-label" for="dovideo">Использовать видео</label>
            </div>
            <label class="form-label" for="peer">SIP URI абонента</label>
            <div class="input-group mb-3">
              <input class="form-control" id="peer" type="text" placeholder="sip:1000@example.com">
              <button class="btn btn-success" type="button" id="call">Позвонить</button>
            </div>
            <div id="call-status"></div>
          </div>
        </div>
      </section>

      <section class="col-12 col-xl-7">
        <div class="card shadow-sm mb-4">
          <div class="card-header">Локальный медиа-поток</div>
          <div class="card-body">
            <div id="sip-local-media" class="row g-3"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header">Удаленный медиа-поток</div>
          <div class="card-body">
            <div id="sip-remote-media" class="row g-3"></div>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
